<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%" style="background-color: white;">
  <!-- Axes -->
  <line x1="50" y1="250" x2="350" y2="250" stroke="#333" stroke-width="3"/> <!-- X axis -->
  <line x1="50" y1="250" x2="50" y2="50" stroke="#333" stroke-width="3"/> <!-- Y axis -->
  <!-- Labels -->
  <text x="360" y="255" font-family="Arial" font-size="14" fill="#333">Χρόνος (t)</text>
  <text x="10" y="40" font-family="Arial" font-size="14" fill="#333">Θερμοκρασία (θ)</text>
  <text x="150" y="270" font-family="Arial" font-size="14" fill="#333">t1</text>
  <text x="250" y="270" font-family="Arial" font-size="14" fill="#333">t2</text>
  <!-- Dotted lines to axes -->
  <line x1="150" y1="250" x2="150" y2="150" stroke="#888" stroke-dasharray="5,5" stroke-width="1.5"/>
  <line x1="250" y1="250" x2="250" y2="100" stroke="#888" stroke-dasharray="5,5" stroke-width="1.5"/>
  <!-- Line A (Mixture - continues going up after boiling) -->
  <path d="M 50 250 L 150 150 L 320 50" fill="none" stroke="#e53935" stroke-width="4"/>
  <text x="330" y="55" font-family="Arial" font-size="16" font-weight="bold" fill="#e53935">A</text>
  <!-- Line B (Pure Substance - flat after boiling) -->
  <path d="M 50 250 L 250 100 L 350 100" fill="none" stroke="#1e88e5" stroke-width="4"/>
  <text x="360" y="105" font-family="Arial" font-size="16" font-weight="bold" fill="#1e88e5">B</text>
</svg>
