<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%" style="background-color: white;">
  <!-- Bonds (behind atoms) -->
  <line x1="150" y1="150" x2="90" y2="210" stroke="#555" stroke-width="8"/>
  <line x1="150" y1="150" x2="210" y2="210" stroke="#555" stroke-width="8"/>
  <!-- Double bond to oxygen -->
  <line x1="140" y1="150" x2="140" y2="80" stroke="#555" stroke-width="8"/>
  <line x1="160" y1="150" x2="160" y2="80" stroke="#555" stroke-width="8"/>
  <!-- C-H bonds left -->
  <line x1="90" y1="210" x2="40" y2="210" stroke="#555" stroke-width="6"/>
  <line x1="90" y1="210" x2="90" y2="260" stroke="#555" stroke-width="6"/>
  <line x1="90" y1="210" x2="50" y2="160" stroke="#555" stroke-width="6"/>
  <!-- C-H bonds right -->
  <line x1="210" y1="210" x2="260" y2="210" stroke="#555" stroke-width="6"/>
  <line x1="210" y1="210" x2="210" y2="260" stroke="#555" stroke-width="6"/>
  <line x1="210" y1="210" x2="250" y2="160" stroke="#555" stroke-width="6"/>

  <!-- Atoms -->
  <!-- Hydrogen (white/light grey) -->
  <circle cx="40" cy="210" r="15" fill="#f5f5f5" stroke="#ccc" stroke-width="2"/>
  <circle cx="90" cy="260" r="15" fill="#f5f5f5" stroke="#ccc" stroke-width="2"/>
  <circle cx="50" cy="160" r="15" fill="#f5f5f5" stroke="#ccc" stroke-width="2"/>
  
  <circle cx="260" cy="210" r="15" fill="#f5f5f5" stroke="#ccc" stroke-width="2"/>
  <circle cx="210" cy="260" r="15" fill="#f5f5f5" stroke="#ccc" stroke-width="2"/>
  <circle cx="250" cy="160" r="15" fill="#f5f5f5" stroke="#ccc" stroke-width="2"/>

  <!-- Carbon (grey/black) -->
  <circle cx="90" cy="210" r="25" fill="#616161"/> <!-- Left C -->
  <circle cx="210" cy="210" r="25" fill="#616161"/> <!-- Right C -->
  <circle cx="150" cy="150" r="25" fill="#616161"/> <!-- Center C -->

  <!-- Oxygen (red) -->
  <circle cx="150" cy="80" r="25" fill="#e53935"/> <!-- Top O -->
</svg>
