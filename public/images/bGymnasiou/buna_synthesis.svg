<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%" style="background-color: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="200" y="20" width="200" height="50" rx="10" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2"/>
  <text x="300" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#1e88e5" text-anchor="middle">CaC2 + H2O</text>
  <text x="300" y="65" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">(Ανθρακασβέστιο + Νερό)</text>
  
  <!-- Arrow 1 -->
  <line x1="300" y1="70" x2="300" y2="100" stroke="#333" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Step 2 -->
  <rect x="200" y="100" width="200" height="40" rx="10" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="300" y="125" font-family="Arial" font-size="16" font-weight="bold" fill="#fb8c00" text-anchor="middle">Ακετυλένιο</text>
  
  <!-- Arrow 2 -->
  <line x1="300" y1="140" x2="300" y2="170" stroke="#333" stroke-width="3" marker-end="url(#arrow)" />
  <text x="310" y="160" font-family="Arial" font-size="12" fill="#888">Διμερισμός (x2)</text>

  <!-- Step 3 -->
  <rect x="200" y="170" width="200" height="40" rx="10" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="300" y="195" font-family="Arial" font-size="16" font-weight="bold" fill="#43a047" text-anchor="middle">Βινυλακετυλένιο</text>

  <!-- Arrow 3 -->
  <line x1="300" y1="210" x2="300" y2="240" stroke="#333" stroke-width="3" marker-end="url(#arrow)" />
  <text x="310" y="230" font-family="Arial" font-size="12" fill="#888">+ Υδρογόνο (H2)</text>

  <!-- Step 4 -->
  <rect x="200" y="240" width="200" height="40" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
  <text x="300" y="265" font-family="Arial" font-size="16" font-weight="bold" fill="#8e24aa" text-anchor="middle">1,3-Βουταδιένιο</text>

  <!-- Arrow 4 -->
  <line x1="300" y1="280" x2="300" y2="310" stroke="#333" stroke-width="3" marker-end="url(#arrow)" />
  <text x="310" y="300" font-family="Arial" font-size="12" fill="#888">Πολυμερισμός</text>

  <!-- Step 5 -->
  <rect x="200" y="310" width="200" height="40" rx="10" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="300" y="335" font-family="Arial" font-size="16" font-weight="bold" fill="#e53935" text-anchor="middle">Buna (Καουτσούκ)</text>
</svg>
